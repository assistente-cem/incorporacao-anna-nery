      const cleanLoc = loc.toLowerCase().includes("belém") ? loc : `${loc}, Belém - PA`;
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(cleanLoc)}`;

    function getFlightTrackerLink(flightCode) {

      return `https://flightaware.com/live/flight/${encodeURIComponent(cleanFlight)}`;

    function renderTabs() {
      const tabContainer = document.getElementById('daysTabContainer');
      if (!tabContainer) return;

      tabContainer.innerHTML = schedule.map((day, idx) => {
        const isActive = idx === selectedDayIndex;
        return `
          <button onclick="switchDay(${idx})" 
                  class="flex-1 min-w-[120px] px-3.5 py-2.5 rounded-xl font-black text-xs sm:text-sm transition-all text-center flex flex-col items-center justify-center border ${
                    isActive 
                      ? 'bg-gold text-navy-dark border-gold shadow-md font-extrabold scale-100' 
                      : 'bg-white/10 text-slate-200 border-white/10 hover:bg-white/20'
                  }">
            <span class="text-[10px] tracking-wider uppercase font-extrabold ${isActive ? 'text-navy-dark/80' : 'text-slate-300'}">${day.weekDay}</span>
            <span class="text-sm sm:text-base font-black">${day.dayLabel}</span>
          </button>
        `;
      }).join('');
    }

    function switchDay(index) {
      selectedDayIndex = index;
      renderTabs();
      renderTimeline();
    }

    function renderTimeline() {
      const dayData = schedule[selectedDayIndex];
      const container = document.getElementById('timelineContainer');
      const titleEl = document.getElementById('currentDayTitle');
      const countEl = document.getElementById('eventCountBadge');

      if (!container || !dayData) return;

      if (titleEl) titleEl.innerText = `${dayData.weekDay.toUpperCase()} — ${dayData.dayLabel}`;
      if (countEl) countEl.innerText = `${dayData.events.length} Atividades`;

      const now = new Date();
      const currentHours = now.getHours() + (now.getMinutes() / 60);
      const isToday = now.toISOString().split('T')[0] === dayData.date;

      let html = `
        <div class="absolute left-3 sm:left-4 top-2 bottom-2 w-0.5 bg-slate-200 -translate-x-1/2"></div>
      `;

      dayData.events.forEach((evt) => {
        const [h, m] = evt.time.split(':').map(Number);
        const eventStartHour = h + (m / 60);
        const isCurrent = isToday && currentHours >= eventStartHour && currentHours < evt.endHour;

        html += `
          <div class="relative pl-6 sm:pl-9 group">
            <!-- Time Indicator Pin -->
            <div class="absolute left-0 top-1.5 w-6 sm:w-8 h-6 sm:h-8 rounded-full flex items-center justify-center -translate-x-1/2 transition ${
              isCurrent 
                ? 'bg-red-600 text-white ring-4 ring-red-200 animate-pulse z-10' 
                : 'bg-navy text-gold shadow-sm border-2 border-white'
            }">
              <i class="fa-solid ${isCurrent ? 'fa-clock' : 'fa-anchor'} text-[10px] sm:text-xs"></i>
            </div>

            <!-- Event Card -->
            <div class="p-4 sm:p-5 rounded-2xl border transition-all ${
              isCurrent 
                ? 'bg-red-50/70 border-red-300 shadow-md ring-2 ring-red-200' 
                : 'bg-white border-slate-200 hover:border-slate-300 hover:shadow-sm'
            }">
              <!-- Top Row: Time, Uniform Badge and Info Button -->
              <div class="flex items-center justify-between flex-wrap gap-2 mb-2">
                <div class="flex items-center gap-2">
                  <span class="text-base sm:text-lg font-black text-navy font-mono bg-navy/5 px-3 py-1 rounded-lg border border-navy/10">
                    ${evt.time}
                  </span>
                  ${isCurrent ? `
                    <span class="px-2.5 py-0.5 rounded-full text-[11px] font-black uppercase bg-red-600 text-white animate-pulse">
                      AGORA
                    </span>
                  ` : ''}
                </div>

                <div class="flex items-center gap-2">
                  ${evt.uniform ? `
                    <button onclick="openModal('modalUniformes')" class="inline-flex items-center gap-1.5 px-3 py-1 rounded-lg bg-gold/20 border border-gold/40 text-navy-dark text-xs sm:text-sm font-extrabold hover:bg-gold/30 transition">
                      <i class="fa-solid fa-shirt text-amber-600 text-xs"></i>
                      <span>${evt.uniform}</span>
                    </button>
                  ` : ''}

                  <!-- Info Button -->
                  <button onclick="showEventDetails('${evt.id}')" title="Mais informações" class="w-9 h-9 rounded-xl bg-slate-100 hover:bg-navy hover:text-white text-navy flex items-center justify-center transition active:scale-95 border border-slate-200 shadow-sm">
                    <i class="fa-solid fa-circle-info text-base"></i>
                  </button>
                </div>
              </div>

              <!-- Activity Title -->
              <h3 class="text-base sm:text-lg font-extrabold text-slate-900 leading-snug mb-2.5">
                ${evt.activity}
              </h3>

              <!-- Location & Actions -->
              <div class="flex flex-wrap items-center gap-2 text-xs sm:text-sm text-slate-600">
                <a href="${getMapsLink(evt.location)}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1.5 text-slate-800 font-bold hover:text-navy hover:underline transition bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-200">
                  <i class="fa-solid fa-location-dot text-red-500"></i>
                  <span class="truncate max-w-[200px] sm:max-w-xs">${evt.location}</span>
                  <i class="fa-solid fa-arrow-up-right-from-square text-[10px] text-slate-400"></i>
                </a>

                <!-- Flight Tracker Highlight Button -->
                ${evt.flight ? `
                  <a href="${getFlightTrackerLink(evt.flight)}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 px-3.5 py-1.5 rounded-xl bg-gradient-to-r from-sky-600 to-blue-700 hover:from-sky-700 hover:to-blue-800 text-white font-black text-xs sm:text-sm transition shadow-md hover:shadow-lg ring-2 ring-sky-300 active:scale-95">
                    <i class="fa-solid ${evt.activity.toLowerCase().includes('chegada') ? 'fa-plane-arrival' : 'fa-plane-departure'} text-amber-300 animate-pulse"></i>

                  <i class="fa-solid fa-users text-navy/60"></i>
                  <span class="font-semibold text-slate-700">Participantes:</span>
                  <span class="truncate text-slate-600 font-medium">${evt.participants}</span>
                </div>
              ` : ''}
            </div>
          </div>
        `;

              <div>
                <span class="text-xs font-black uppercase text-gold-dark tracking-wider block">Autoridade</span>
                <h4 class="text-lg sm:text-xl font-black text-navy">${aut.nome}</h4>
                <p class="text-xs sm:text-sm text-slate-600 font-semibold">${aut.cargo}</p>
              </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-xs sm:text-sm">
              <!-- Hospedagem & Despenseiro -->
              <div class="bg-slate-50 p-3 rounded-xl border border-slate-200/80 space-y-1">
                <div class="flex items-center gap-1.5 font-black text-navy">
                  <i class="fa-solid fa-hotel text-amber-500"></i>
                  <span>Acomodação</span>
                </div>
                <p class="font-bold text-slate-800">${aut.hospedagem}</p>
                <p class="text-slate-600 font-medium">Período: <span class="font-bold text-slate-800">${aut.periodo}</span></p>
                <p class="text-slate-600 font-medium pt-1 border-t border-slate-200/60 mt-1">
                  Despenseiro: <span class="font-bold text-slate-900">${aut.despenseiro}</span>
                </p>
              </div>

              <!-- Viatura & Placa -->
              <div class="bg-slate-50 p-3 rounded-xl border border-slate-200/80 space-y-1.5">
                <div class="flex items-center gap-1.5 font-black text-navy">
                  <i class="fa-solid fa-car-side text-blue-600"></i>
                  <span>Viatura</span>
                </div>
                <p class="font-bold text-slate-800">${aut.viatura}</p>
                <div class="inline-flex items-center gap-1.5 bg-slate-900 text-white font-mono font-black text-xs px-2.5 py-1 rounded border border-slate-700 shadow-sm">
                  <span>PLACA:</span>
                  <span class="text-gold font-extrabold tracking-widest">${aut.placa}</span>
                </div>
              </div>
            </div>

            <!-- Motorista & Assistente -->
            <div class="space-y-2 pt-1 border-t border-slate-100 text-xs sm:text-sm">
              <div class="flex items-center justify-between bg-slate-50 p-2.5 rounded-xl border border-slate-200/80">
                <div>
                  <span class="text-slate-500 font-bold block text-[11px]">MOTORISTA DESIGNADO</span>
                  <p class="font-black text-slate-900">${aut.motorista}</p>
                </div>
                <div class="flex items-center gap-2">
                  <a href="tel:${cleanPhone(aut.telefoneMotorista)}" class="w-9 h-9 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white flex items-center justify-center transition shadow-sm" title="Ligar">
                    <i class="fa-solid fa-phone"></i>
                  </a>
                  <a href="https://wa.me/55${cleanPhone(aut.telefoneMotorista)}" target="_blank" rel="noopener noreferrer" class="w-9 h-9 rounded-xl bg-green-500 hover:bg-green-600 text-white flex items-center justify-center transition shadow-sm" title="WhatsApp">
                    <i class="fa-brands fa-whatsapp text-lg"></i>
                  </a>
                </div>
              </div>

              ${aut.assistentes ? `
                <div class="p-2.5 bg-slate-50 rounded-xl border border-slate-200/80">
                  <span class="text-slate-500 font-bold block text-[11px]">ASSISTENTE / AJUDANTE DE ORDENS</span>
                  <p class="font-bold text-slate-800">${aut.assistentes}</p>
                </div>
              ` : ''}
            </div>
          </div>
        `).join('');
      }

      // 2. Hospedagem
      const hospedagemContainer = document.getElementById('hospedagemListContainer');
      if (hospedagemContainer) {
        hospedagemContainer.innerHTML = logistics.hospedagem.map(h => `
          <div class="p-4 bg-slate-50 border border-slate-200 rounded-2xl space-y-1.5 shadow-sm">
            <h4 class="text-base sm:text-lg font-black text-navy">${h.autoridade}</h4>
            <p class="text-xs sm:text-sm font-bold text-slate-800"><i class="fa-solid fa-hotel text-amber-500 mr-1.5"></i>${h.local} (${h.suite})</p>
            <p class="text-xs sm:text-sm text-slate-600 font-medium">Período: <span class="font-bold text-slate-800">${h.periodo}</span></p>
            <p class="text-xs sm:text-sm text-slate-600 font-medium">Despenseiro: <span class="font-bold text-slate-900">${h.despenseiro || '-'}</span></p>
          </div>
        `).join('');
      }

      // 3. Uniformes Cards (Clean white background, fail-safe image container)
      const uniformesContainer = document.getElementById('uniformesGridContainer');
      if (uniformesContainer) {
        uniformesContainer.innerHTML = logistics.uniformes.map(u => `
          <div class="p-4 bg-slate-50 border border-slate-200 rounded-2xl space-y-3 shadow-sm flex flex-col items-center text-center">
            <h4 class="text-base sm:text-lg font-black text-navy uppercase tracking-wider">${u.nome}</h4>
            <div class="w-full h-48 bg-white rounded-xl overflow-hidden border border-slate-300 flex items-center justify-center relative">
              <img src="./${u.file}" alt="${u.nome}" class="w-full h-full object-contain p-2" onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden');">
              <div class="hidden w-full h-full bg-white flex flex-col items-center justify-center p-4 text-center text-slate-400 font-bold text-xs">
                <i class="fa-solid fa-shirt text-3xl mb-2 text-slate-300 block"></i>
                <span>Imagem (${u.file})</span>
              </div>
            </div>
          </div>
        `).join('');
      }

      // 4. Viaturas
      const viaturasContainer = document.getElementById('viaturasListContainer');
      if (viaturasContainer) {
        viaturasContainer.innerHTML = logistics.viaturas.map(v => `
          <div class="p-4 bg-slate-50 border border-slate-200 rounded-2xl space-y-2 shadow-sm">
            <div class="flex items-center justify-between">
              <span class="text-xs sm:text-sm font-black px-3 py-1 rounded-lg bg-navy text-white font-mono">${v.vtr}</span>
              <span class="text-xs font-mono font-black bg-slate-900 text-gold px-2.5 py-1 rounded border border-slate-700">PLACA: ${v.placa}</span>
            </div>
            <h4 class="text-base sm:text-lg font-black text-slate-900">${v.autoridade}</h4>
            <p class="text-xs sm:text-sm text-slate-600 font-bold">${v.modelo}</p>
            <div class="flex items-center justify-between pt-2 border-t border-slate-200 text-xs sm:text-sm">
              <span class="font-bold text-slate-800"><i class="fa-solid fa-user-gear text-slate-500 mr-1"></i>${v.motorista}</span>
              <div class="flex items-center gap-2">
                <a href="tel:${cleanPhone(v.tel)}" class="px-3 py-1.5 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 transition inline-flex items-center gap-1">
                  <i class="fa-solid fa-phone"></i> Ligar
                </a>
                <a href="https://wa.me/55${cleanPhone(v.tel)}" target="_blank" rel="noopener noreferrer" class="px-3 py-1.5 bg-green-500 text-white rounded-xl font-bold hover:bg-green-600 transition inline-flex items-center gap-1">
                  <i class="fa-brands fa-whatsapp"></i> WhatsApp
                </a>
              </div>
            </div>
          </div>
        `).join('');
      }

      // 5. Voos Modal Content
      const voosContainer = document.getElementById('voosListContainer');
      if (voosContainer) {
        voosContainer.innerHTML = logistics.voos.map(f => {
          const isArrival = f.tipo.toLowerCase().includes('chegada');
          const flightIcon = isArrival ? 'fa-plane-arrival' : 'fa-plane-departure';
          return `
            <div class="p-4 bg-slate-50 border border-slate-200 rounded-2xl space-y-3 shadow-sm">
              <div class="flex items-center justify-between">
                <span class="text-xs sm:text-sm font-black px-2.5 py-1 rounded bg-sky-600 text-white font-mono flex items-center gap-1.5">
                  <i class="fa-solid ${flightIcon}"></i> ${f.codigo}
                </span>
                <span class="text-xs sm:text-sm font-extrabold text-navy font-mono">${f.horario}</span>
              </div>
              <div>
                <h4 class="text-base sm:text-lg font-extrabold text-slate-900">${f.passageiro}</h4>
                <p class="text-xs sm:text-sm text-slate-600 font-semibold">${f.tipo} — <span class="text-slate-500">${f.rota}</span></p>
              </div>
              <a href="${getFlightTrackerLink(f.codigo)}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center gap-2 w-full py-2.5 rounded-xl bg-gradient-to-r from-sky-600 to-blue-700 hover:from-sky-700 hover:to-blue-800 text-white font-black text-xs sm:text-sm transition shadow-md active:scale-95">
                <i class="fa-solid ${flightIcon} text-amber-300"></i>
                <span>Rastrear Voo (${f.codigo})</span>
                <i class="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>
              </a>
            </div>
          `;
        }).join('');
      }

      // 6. Telefones Úteis
      const contatosContainer = document.getElementById('contatosListContainer');
      if (contatosContainer) {
        contatosContainer.innerHTML = logistics.telefonesUteis.map(cat => `
          <div class="space-y-3">
            <h4 class="text-xs sm:text-sm font-black text-navy uppercase tracking-wider border-b-2 border-gold/40 pb-1">${cat.categoria}</h4>
            <div class="space-y-2">
              ${cat.itens.map(item => `
                <div class="p-3 bg-slate-50 border border-slate-200/80 rounded-xl flex items-center justify-between gap-3">
                  <div>
                    <h5 class="text-xs sm:text-sm font-black text-slate-900">${item.nome}</h5>
                    <p class="text-[11px] sm:text-xs text-slate-600 font-medium">${item.cargo}</p>
                    <span class="text-xs font-mono font-bold text-navy block mt-0.5">${item.tel}</span>
                  </div>
                  <div class="flex items-center gap-1.5 flex-shrink-0">
                    <a href="tel:${cleanPhone(item.tel)}" class="w-8 h-8 rounded-lg bg-emerald-600 text-white flex items-center justify-center hover:bg-emerald-700 transition" title="Ligar">
                      <i class="fa-solid fa-phone text-xs"></i>
                    </a>
                    <a href="https://wa.me/55${cleanPhone(item.tel)}" target="_blank" rel="noopener noreferrer" class="w-8 h-8 rounded-lg bg-green-500 text-white flex items-center justify-center hover:bg-green-600 transition" title="WhatsApp">
                      <i class="fa-brands fa-whatsapp text-sm"></i>
                    </a>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('');
      }
    }

    function openModal(modalId) {
      const modal = document.getElementById(modalId);
      if (modal) {
        modal.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
      }
    }

    function closeModal(modalId) {
      const modal = document.getElementById(modalId);
      if (modal) {
        modal.classList.add('hidden');
        document.body.style.overflow = '';
      }
    }

    function showEventDetails(eventId) {
      const modal = document.getElementById('modalEvent');
      const container = document.getElementById('modalEventContent');
      if (!modal || !container) return;

      let evtData = null;
      for (const day of schedule) {
        const found = day.events.find(e => e.id === eventId);
        if (found) { evtData = found; break; }
      }

      if (!evtData) return;

      container.innerHTML = `
        <div class="space-y-3.5 text-xs sm:text-sm">
          <div class="flex items-center justify-between">
            <span class="text-base sm:text-lg font-black font-mono text-navy bg-navy/10 px-3 py-1 rounded-lg">${evtData.time}</span>
            ${evtData.uniform ? `
              <span class="px-3 py-1 rounded-lg bg-gold/20 text-navy-dark font-extrabold border border-gold/40">
                ${evtData.uniform}
              </span>
            ` : ''}
          </div>

          <h3 class="text-lg font-black text-slate-900 leading-snug">${evtData.activity}</h3>

          <div class="p-3 bg-slate-50 rounded-xl border border-slate-200 space-y-1.5">
            <div class="flex items-center gap-2 font-bold text-slate-800">
              <i class="fa-solid fa-location-dot text-red-500"></i>
              <span>${evtData.location}</span>
            </div>
            <a href="${getMapsLink(evtData.location)}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1.5 text-xs text-navy font-bold hover:underline">
              <span>Abrir no Google Maps</span>
              <i class="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>
            </a>
          </div>

          ${evtData.flight ? `
            <div class="p-3 bg-sky-50 rounded-xl border border-sky-200 flex items-center justify-between">
              <div>
                <span class="text-xs font-bold text-sky-800">Código do Voo:</span>
                <p class="font-black text-sky-900 font-mono text-base">${evtData.flight}</p>
              </div>
              <a href="${getFlightTrackerLink(evtData.flight)}" target="_blank" rel="noopener noreferrer" class="px-3 py-1.5 bg-sky-600 hover:bg-sky-700 text-white rounded-xl text-xs font-black transition">
                Rastrear Voo
              </a>
            </div>
          ` : ''}

          ${evtData.participants ? `
            <div class="p-3 bg-slate-50 rounded-xl border border-slate-200">
              <span class="font-extrabold text-navy">Participantes:</span>
              <p class="text-slate-700 font-medium mt-0.5">${evtData.participants}</p>
            </div>
          ` : ''}

          ${evtData.notes ? `
            <div class="p-3 bg-amber-50 rounded-xl border border-amber-200/80 text-amber-900">
              <span class="font-extrabold flex items-center gap-1.5">
                <i class="fa-solid fa-circle-info text-amber-600"></i> Observações:
              </span>
              <p class="font-medium mt-0.5">${evtData.notes}</p>
            </div>
          ` : ''}
        </div>
      `;

      openModal('modalEvent');
    }
  </script>
</body>
</html>
